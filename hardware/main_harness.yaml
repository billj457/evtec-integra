# Project Integra - EV Conversion Harness
# Vehicle: Acura Integra / Drive: Tesla Front SDU P100D / Battery: Chrysler Pacifica 16kWh
# Control: AEM VCU 275

connectors:
  # --- Control System ---
  AEM_VCU_275:
    type: AEM VCU
    pincount: 80
  AEM_PDU8_A:
    type: AEM PDU-8
    notes: ""
  AEM_PDU8_B:
    type: AEM PDU-8
    notes: ""
  AEM_Keypad:
    type: CAN 8-Button
  AEM_CD5L_Dash:
    type: AEM Logging Dash
    
  Kvaser_Leaf_v3:
    type: Kvaser Leaf v3
    pincount: 2
    pinlabels: [CAN1_H, CAN1_L]

  # --- Drive & Battery ---
  Tesla_SDU_Logic:
    type: Tesla SDU (AEM Board 30-8403)
    pincount: 23
  AEM_BMS_Master:
    type: Mini Master
  Pacifica_Battery_Pack:
    type: 360V 16kWh
    
  IVTS:
    type: Isabellenhuette Current Sensor 
    pn: IVT-S-1K-U3-I-CAN1-12/24
    pincount: 4
    pinlabels: [12V, GND, CAN3_H, CAN3_L]

  # --- Thermal & HV Components ---
  Radiator_Fan_A:
  Radiator_Fan_B:
  Tesla_Superbottle_Valve:
    type: Tesla Model 3 (1068767-00-G)
    notes: "LIN-controlled via Mach Systems GW"
  Tesla_Superbottle_Chiller:
    type: Tesla Model 3 (1068767-00-G)
    notes: "LIN-controlled via Mach Systems GW"
  Tesla_Superbottle_Pump_A:
    type: Tesla Model 3 (1068767-00-G)
    notes: "LIN-controlled via Mach Systems GW"
  Tesla_Superbottle_Pump_B:
    type: Tesla Model 3 (1068767-00-G)
    notes: "LIN-controlled via Mach Systems GW"
  Tesla_AC_Compressor_HV:
    type: 6007380-00-D
  Tesla_AC_Compressor_LV:
    type: 6007380-00-D
  Tesla_Battery_Heater:
    type: 1009508-00-D
  PTC_Cabin_Heater_HV:
  PTC_Cabin_Heater_LV:
  Tesla_HVJB_HV:
  Tesla_HVJB_LV:

  # --- Security & Safety ---
  Compustar_Alarm:
    type: CS2WQ900-AS
  JDI_Ghost_Key:
    type: Digital Kill Switch
  HVIL_Relay:
    type: SPDT 40A
    notes: "HVIL Contactor Relay"

 # --- Charging ---
  AEM_CCU_ACInput:
    type: Combined Charging Unit (30-8405)
    pincount: 5
    pinlabels: [L1, N, PE, HVIL_IN, HVIL_OUT]
    notes: "High Voltage AC Input from J1772 Port"

  AEM_CCU_HV:
    type: Combined Charging Unit (30-8405)
    pincount: 4
    pinlabels: [BATT_HV+, BATT_HV-, HVIL_IN, HVIL_OUT]
    notes: "High Voltage DC Output to Battery"

  AEM_CCU_LV:
    type: Combined Charging Unit (30-8405)
    pincount: 5
    pinlabels: [1H: WAKE_PWR, 3C: OBC_WAKE, 3D: DCDC_WAKE, 4A: CAN3_H, 4B: CAN3_L, 4C: HVIL_IN, 4D: HVIL_OUT, 4G: GND]
    notes: "Low Voltage Control Connector"

  AEM_CCU_12V:
    type: Combined Charging Unit (30-8405)
    pincount: 2
    pinlabels: [12V_POS, 12V_GND]
    notes: "DC-DC Low Voltage Output"
    
  J1772_Port_HV:
    type: Charge Port
  J1772_Port_LV:
    type: Charge Port

  # --- Chassis ---
  DB6_Climate:
  DB6_Windows:
  DB6_Locks:
  DB6_Lights:
  DB6_Audio:
  DB6_12v:
  DB6_Wipers:

cables:
  # --- Communication ---
  CAN_PC: {gauge: 22 AWG, colors: [YE, GN], twisted: true} # VCU CAN 1
  CAN_Drive:  {gauge: 22 AWG, colors: [OR, BU], twisted: true} # VCU CAN 2
  CAN_Charge: {gauge: 22 AWG, colors: [WT, BK], twisted: true} # VCU CAN 3
  isoSPI_Daisy: {gauge: 24 AWG, colors: [BU, WT], twisted: true} # BMS Chain
  LIN_Thermal: {gauge: 22 AWG, color: PU} # Mach GW to Superbottle

  # --- Safety & Power ---
  HVIL_Main:   {gauge: 18 AWG, color: RD}
  HVIL_Charge: {gauge: 18 AWG, color: OR}
  Logic_12V:   {gauge: 18 AWG, color: RD}
  Logic_GND:   {gauge: 18 AWG, color: BK}
  
connections:
  # CAN 1: PC Communication
  - - AEM_VCU_275: [CAN1_H, CAN1_L]
    - CAN_PC: [1, 2]
    - [Kvaser_Leaf_v3]

  # CAN 2: Powertrain
  - - AEM_VCU_275: [CAN2_H, CAN2_L]
    - CAN_Drive: [1, 2]
    - [Tesla_SDU_Logic, AEM_PDU8_A, AEM_PDU8_B, AEM_CD5L_Dash, Mach_LIN_GW]

  # CAN 3: Charging
  - - AEM_VCU_275: [CAN3_H, CAN3_L]
    - CAN_Charge: [1, 2]
    - [AEM_CCU, AEM_Keypad, AEM_CD5L_Dash, AEM_BMS_Master, IVTS]

  # --- 2. DUAL HVIL LOOPS ---
  # Loop A: Main Drive
  - - AEM_VCU_275: [HVIL_Out_1]
    - HVIL_Main: [1]
    - Tesla_HVJB_LV: [HVIL_In]
  - - Tesla_HVJB_LV: [HVIL_Out]
    - HVIL_Main: [1]
    - Tesla_SDU_Logic: [HVIL_In]
  - - Tesla_SDU_Logic: [HVIL_Out]
    - AEM_VCU_275: [HVIL_In_1]

  # Loop B: Charging
  - - AEM_CCU: [HVIL_Out]
    - HVIL_Charge: [1]
    - J1772_Port: [HVIL_Loop]
  - - J1772_Port: [HVIL_Loop]
    - HVIL_Charge: [1]
    - AEM_CCU: [HVIL_In]

  # --- 3. BMS isoSPI DAISY CHAIN ---
  # This uses your Satellite kit to link the 6 modules
  - - AEM_BMS_Master: [isoSPI_Out+, isoSPI_Out-]
    - isoSPI_Daisy: [1, 2]
    - BMS_Satellite_1: [isoSPI_In+, isoSPI_In-]
  - - BMS_Satellite_1: [isoSPI_Out+, isoSPI_Out-]
    - isoSPI_Daisy: [1, 2]
    - BMS_Satellite_2: [isoSPI_In+, isoSPI_In-]
    # Repeat for Satellites 3-6...

  # --- 4. SUPERBOTTLE & LIN ---
  - - Mach_LIN_GW: [LIN_Out]
    - LIN_Thermal: [1]
    - Tesla_Superbottle: [LIN_Signal]
